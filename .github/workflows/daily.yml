name: Daily Oil Price Fetch

on:
  schedule:
    # 18:00 เวลาไทย = 11:00 UTC (ไทย UTC+7)
    - cron: "0 15 * * *"
  workflow_dispatch:   # ให้กดรันเองได้ด้วย (สำหรับ test)

permissions:
  contents: write      # ให้ commit กลับ repo ได้

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run fetch script
        run: python fetch_oil.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add oil_prices.csv
          git diff --staged --quiet || git commit -m "Update oil prices $(date +'%Y-%m-%d')"
          git push
